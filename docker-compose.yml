# ═══════════════════════════════════════════════════════
# Kiku — Docker Compose 一键部署
# 启动: docker compose up -d
# 停止: docker compose down
# ═══════════════════════════════════════════════════════

services:

  # ── PostgreSQL 数据库 ────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: kiku-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kiku
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kiku_secret}
      POSTGRES_DB: kiku
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"   # 仅本地访问，生产环境可移除
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiku -d kiku"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kiku-net

  # ── Node.js 后端服务 ─────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: kiku-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://kiku:${DB_PASSWORD:-kiku_secret}@postgres:5432/kiku
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-in-production}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    ports:
      - "127.0.0.1:3000:3000"   # 仅本地访问
    networks:
      - kiku-net

  # ── Nginx 前端 + 反向代理 ────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: kiku-nginx
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    ports:
      - "${PORT:-80}:80"
    networks:
      - kiku-net

# ── 持久化卷 ──────────────────────────────────────────
volumes:
  pgdata:

# ── 容器间网络 ────────────────────────────────────────
networks:
  kiku-net:
    driver: bridge
